<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Farm</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }

        #hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.55);
            padding: 10px 24px;
            border-radius: 24px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: opacity 0.3s;
            text-align: center;
        }
        #hud .mode { font-weight: 700; color: #FFD700; }
        #hud .hint { font-size: 12px; opacity: 0.75; margin-top: 2px; }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255,255,255,0.4);
        }
        #crosshair::before { width: 2px; height: 14px; left: -1px; top: -7px; }
        #crosshair::after { width: 14px; height: 2px; left: -7px; top: -1px; }
    </style>
</head>
<body>
    <div id="hud">
        <div><span class="mode">🎥 上帝视角</span></div>
        <div class="hint">按 <b>F</b> 切换第一人称 | 拖拽旋转 · 滚轮缩放 · WASD 平移</div>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ──────────────────────────────────
        // SCENE, RENDERER, CAMERA
        // ──────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 40, 120);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.15;
        document.body.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(
            50, window.innerWidth / window.innerHeight, 0.5, 150
        );
        camera.position.set(16, 12, 18);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.minDistance = 3;
        controls.maxDistance = 50;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;
        controls.minPolarAngle = 0.15;
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.ROTATE,
            MIDDLE: THREE.MOUSE.PAN,
            RIGHT: THREE.MOUSE.PAN
        };
        controls.update();

        // ──────────────────────────────────
        // FIRST-PERSON STATE
        // ──────────────────────────────────
        let isFirstPerson = false;
        const fpsState = {
            yaw: -Math.PI / 4,
            pitch: -0.2,
            velocity: new THREE.Vector3(),
            moveSpeed: 5.5,
            eyeHeight: 1.3,
        };
        const keys = { w: false, a: false, s: false, d: false, shift: false };
        const buildings = [];

        function captureOrbitOrientation() {
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            fpsState.yaw = Math.atan2(dir.x, dir.z);
            fpsState.pitch = Math.asin(dir.y);
        }

        const hudEl = document.getElementById('hud');
        const crosshairEl = document.getElementById('crosshair');

        function updateHUD() {
            if (isFirstPerson) {
                hudEl.innerHTML = '<div><span class="mode">🚶 第一人称</span></div>'
                    + '<div class="hint">按 <b>F</b> 返回上帝视角 | WASD 移动 · 鼠标环顾 · Shift 加速</div>';
                crosshairEl.style.display = 'block';
            } else {
                hudEl.innerHTML = '<div><span class="mode">🎥 上帝视角</span></div>'
                    + '<div class="hint">按 <b>F</b> 切换第一人称 | 拖拽旋转 · 滚轮缩放 · <b>WASD</b> 平移</div>';
                crosshairEl.style.display = 'none';
            }
        }

        // ──────────────────────────────────
        // LIGHTING
        // ──────────────────────────────────
        const ambientLight = new THREE.AmbientLight(0x6688CC, 0.5);
        scene.add(ambientLight);

        const hemisphereLight = new THREE.HemisphereLight(0x87CEEB, 0x4A7C2E, 0.35);
        scene.add(hemisphereLight);

        const sunLight = new THREE.DirectionalLight(0xFFF5E6, 4.0);
        sunLight.position.set(15, 20, 8);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 120;
        sunLight.shadow.camera.left = -30;
        sunLight.shadow.camera.right = 30;
        sunLight.shadow.camera.top = 30;
        sunLight.shadow.camera.bottom = -30;
        sunLight.shadow.bias = -0.0001;
        sunLight.shadow.normalBias = 0.02;
        scene.add(sunLight);

        // ──────────────────────────────────
        // MATERIALS
        // ──────────────────────────────────
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x4A7C2E, roughness: 0.9, metalness: 0.0 });
        const dirtMat = new THREE.MeshStandardMaterial({ color: 0xC4A45A, roughness: 0.95, metalness: 0.0 });
        const barnBodyMat = new THREE.MeshStandardMaterial({ color: 0xCC3333, roughness: 0.5, metalness: 0.05 });
        const barnRoofMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.5, metalness: 0.05 });
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x8B5E3C, roughness: 0.7, metalness: 0.0 });
        const darkWoodMat = new THREE.MeshStandardMaterial({ color: 0x5C4033, roughness: 0.7, metalness: 0.0 });
        const windowMat = new THREE.MeshStandardMaterial({ color: 0xADD8E6, roughness: 0.2, metalness: 0.1, emissive: 0x111111, emissiveIntensity: 0.3 });
        const siloMat = new THREE.MeshStandardMaterial({ color: 0xC0C0C0, roughness: 0.3, metalness: 0.7 });
        const leafMat1 = new THREE.MeshStandardMaterial({ color: 0x2D5A27, roughness: 0.8, metalness: 0.0 });
        const leafMat2 = new THREE.MeshStandardMaterial({ color: 0x3A7D34, roughness: 0.8, metalness: 0.0 });
        const leafMat3 = new THREE.MeshStandardMaterial({ color: 0x4A9E3F, roughness: 0.8, metalness: 0.0 });
        const cornMat = new THREE.MeshStandardMaterial({ color: 0x5D8230, roughness: 0.8, metalness: 0.0 });
        const wheatMat = new THREE.MeshStandardMaterial({ color: 0x7CB342, roughness: 0.8, metalness: 0.0 });
        const pumpkinMat = new THREE.MeshStandardMaterial({ color: 0xFF6600, roughness: 0.6, metalness: 0.0 });
        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 1.0, metalness: 0.0 });
        const houseWallMat = new THREE.MeshStandardMaterial({ color: 0xF5DEB3, roughness: 0.7, metalness: 0.0 });
        const houseRoofMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6, metalness: 0.0 });
        const stoneMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.5, metalness: 0.1 });
        const ironMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.8 });
        const hayMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.85, metalness: 0.0 });
        const whiteMat = new THREE.MeshStandardMaterial({ color: 0xF5F5F5, roughness: 0.6, metalness: 0.0 });
        const flowerMat1 = new THREE.MeshStandardMaterial({ color: 0xFF6B8A, roughness: 0.7, metalness: 0.0 });
        const flowerMat2 = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.7, metalness: 0.0 });
        const flowerMat3 = new THREE.MeshStandardMaterial({ color: 0xFF8C42, roughness: 0.7, metalness: 0.0 });
        const bushMat = new THREE.MeshStandardMaterial({ color: 0x3A6B2A, roughness: 0.8, metalness: 0.0 });

        // ══════════════════════════════════════════════
        // GROUND
        // ══════════════════════════════════════════════
        const groundGeo = new THREE.PlaneGeometry(60, 60, 50, 50);
        groundGeo.rotateX(-Math.PI / 2);
        const posAttr = groundGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const x = posAttr.getX(i);
            const z = posAttr.getZ(i);
            const h = Math.sin(x * 0.25) * Math.cos(z * 0.25) * 0.5
                    + Math.sin(x * 0.6 + 1.5) * Math.cos(z * 0.4) * 0.3;
            posAttr.setY(i, h);
        }
        groundGeo.computeVertexNormals();
        const ground = new THREE.Mesh(groundGeo, grassMat);
        ground.receiveShadow = true;
        ground.name = 'ground';
        scene.add(ground);

        const groundPositions = groundGeo.attributes.position;
        function getGroundHeight(x, z) {
            let bestDist = Infinity;
            let bestY = 0;
            for (let i = 0; i < groundPositions.count; i++) {
                const vx = groundPositions.getX(i);
                const vz = groundPositions.getZ(i);
                const vy = groundPositions.getY(i);
                const dx = vx - x;
                const dz = vz - z;
                const dist = dx * dx + dz * dz;
                if (dist < bestDist) { bestDist = dist; bestY = vy; }
            }
            return bestY;
        }

        // ──────────────────────────────────
        // DIRT PATH
        // ──────────────────────────────────
        const pathGeo = new THREE.PlaneGeometry(3, 12);
        pathGeo.rotateX(-Math.PI / 2);
        const path = new THREE.Mesh(pathGeo, dirtMat);
        path.position.set(0, 0.01, 3);
        path.receiveShadow = true;
        scene.add(path);

        for (let i = 0; i < 5; i++) {
            const patchGeo = new THREE.CircleGeometry(0.6 + Math.random() * 0.8, 16);
            patchGeo.rotateX(-Math.PI / 2);
            const patch = new THREE.Mesh(patchGeo, dirtMat);
            patch.position.set(-2 + i * 1.2, 0.008, 1.5 + Math.random() * 0.8);
            patch.receiveShadow = true;
            scene.add(patch);
        }

        // ══════════════════════════════════════════════
        // BARN (scaled up 1.6x)
        // ══════════════════════════════════════════════
        const barnGroup = new THREE.Group();
        const BARN_S = 1.6;

        const barnBody = new THREE.Mesh(new THREE.BoxGeometry(4 * BARN_S, 3 * BARN_S, 6 * BARN_S), barnBodyMat);
        barnBody.position.y = 1.5 * BARN_S;
        barnBody.castShadow = true;
        barnBody.receiveShadow = true;
        barnGroup.add(barnBody);

        const roof = new THREE.Mesh(new THREE.ConeGeometry(3 * BARN_S, 2.4 * BARN_S, 4), barnRoofMat);
        roof.position.y = 3 * BARN_S + 1.2 * BARN_S;
        roof.rotation.y = Math.PI / 4;
        roof.castShadow = true;
        roof.receiveShadow = true;
        barnGroup.add(roof);

        // Barn trim/accents
        const barnTrimTop = new THREE.Mesh(
            new THREE.BoxGeometry(4.2 * BARN_S, 0.12, 6.2 * BARN_S), whiteMat
        );
        barnTrimTop.position.y = 3 * BARN_S;
        barnTrimTop.castShadow = true;
        barnGroup.add(barnTrimTop);

        // Door
        const doorW = 1.2;
        const doorH = 2.6;
        const doorGeo = new THREE.BoxGeometry(doorW * 0.5, doorH, 0.1);
        const door1 = new THREE.Mesh(doorGeo, darkWoodMat);
        door1.position.set(-doorW * 0.25, doorH / 2, 3 * BARN_S + 0.05);
        door1.castShadow = true;
        barnGroup.add(door1);
        const door2 = new THREE.Mesh(doorGeo, darkWoodMat);
        door2.position.set(doorW * 0.25, doorH / 2, 3 * BARN_S + 0.05);
        door2.castShadow = true;
        barnGroup.add(door2);

        function createWindow(x, y, z, ry, scale = 1.0) {
            const winGroup = new THREE.Group();
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.7 * scale, 0.7 * scale, 0.06), woodMat);
            frame.castShadow = true;
            winGroup.add(frame);
            const pane = new THREE.Mesh(new THREE.BoxGeometry(0.5 * scale, 0.5 * scale, 0.02), windowMat);
            pane.position.z = 0.02;
            winGroup.add(pane);
            const hBar = new THREE.Mesh(new THREE.BoxGeometry(0.5 * scale, 0.04, 0.04), woodMat);
            hBar.position.z = 0.03;
            winGroup.add(hBar);
            const vBar = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.5 * scale, 0.04), woodMat);
            vBar.position.z = 0.03;
            winGroup.add(vBar);
            winGroup.position.set(x, y, z);
            winGroup.rotation.y = ry;
            return winGroup;
        }

        barnGroup.add(createWindow(-2 * BARN_S - 0.05, 2.5 * BARN_S, 0, 0, BARN_S));
        barnGroup.add(createWindow(2 * BARN_S + 0.05, 2.5 * BARN_S, 0, 0, BARN_S));
        barnGroup.add(createWindow(0, 3.5 * BARN_S, 3 * BARN_S + 0.05, 0, 0.8)); // hay loft

        barnGroup.position.set(0, 0, -3);
        scene.add(barnGroup);
        buildings.push({
            minX: barnGroup.position.x - 2 * BARN_S, maxX: barnGroup.position.x + 2 * BARN_S,
            minZ: barnGroup.position.z - 3 * BARN_S, maxZ: barnGroup.position.z + 3 * BARN_S,
            label: 'barn'
        });

        // ══════════════════════════════════════════════
        // SILO (scaled up 1.5x)
        // ══════════════════════════════════════════════
        const siloGroup = new THREE.Group();
        const SILO_S = 1.5;

        const siloBody = new THREE.Mesh(new THREE.CylinderGeometry(0.8 * SILO_S, 0.85 * SILO_S, 6 * SILO_S, 32), siloMat);
        siloBody.position.y = 3 * SILO_S;
        siloBody.castShadow = true;
        siloBody.receiveShadow = true;
        siloGroup.add(siloBody);

        const domeGeo = new THREE.SphereGeometry(0.85 * SILO_S, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
        const dome = new THREE.Mesh(domeGeo, siloMat);
        dome.position.y = 6 * SILO_S;
        dome.castShadow = true;
        dome.receiveShadow = true;
        siloGroup.add(dome);

        // Silo bands
        for (let by = 1.5; by < 6; by += 1.5) {
            const band = new THREE.Mesh(
                new THREE.TorusGeometry(0.87 * SILO_S, 0.05, 8, 32), darkWoodMat
            );
            band.rotation.x = Math.PI / 2;
            band.position.y = by * SILO_S;
            band.castShadow = true;
            siloGroup.add(band);
        }

        siloGroup.position.set(4.5, 0, -3);
        scene.add(siloGroup);
        buildings.push({
            minX: siloGroup.position.x - 0.85 * SILO_S, maxX: siloGroup.position.x + 0.85 * SILO_S,
            minZ: siloGroup.position.z - 0.85 * SILO_S, maxZ: siloGroup.position.z + 0.85 * SILO_S,
            label: 'silo'
        });

        // ══════════════════════════════════════════════
        // FARMHOUSE (scaled up 1.5x)
        // ══════════════════════════════════════════════
        const houseGroup = new THREE.Group();
        const HOUSE_S = 1.5;

        const houseBody = new THREE.Mesh(new THREE.BoxGeometry(2.5 * HOUSE_S, 2.2 * HOUSE_S, 3.5 * HOUSE_S), houseWallMat);
        houseBody.position.y = 1.1 * HOUSE_S;
        houseBody.castShadow = true;
        houseBody.receiveShadow = true;
        houseGroup.add(houseBody);

        const houseRoof = new THREE.Mesh(new THREE.ConeGeometry(2 * HOUSE_S, 1.6 * HOUSE_S, 4), houseRoofMat);
        houseRoof.position.y = 2.2 * HOUSE_S + 0.8 * HOUSE_S;
        houseRoof.rotation.y = Math.PI / 4;
        houseRoof.castShadow = true;
        houseRoof.receiveShadow = true;
        houseGroup.add(houseRoof);

        const chimney = new THREE.Mesh(
            new THREE.BoxGeometry(0.3 * HOUSE_S, 2 * HOUSE_S, 0.3 * HOUSE_S),
            new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6, metalness: 0.0 })
        );
        chimney.position.set(0.7 * HOUSE_S, 3 * HOUSE_S, -0.6 * HOUSE_S);
        chimney.castShadow = true;
        houseGroup.add(chimney);

        const houseDoor = new THREE.Mesh(new THREE.BoxGeometry(0.7 * HOUSE_S, 1.5 * HOUSE_S, 0.08), darkWoodMat);
        houseDoor.position.set(0, 0.75 * HOUSE_S, 1.75 * HOUSE_S + 0.04);
        houseDoor.castShadow = true;
        houseGroup.add(houseDoor);

        houseGroup.add(createWindow(-0.75 * HOUSE_S, 1.5 * HOUSE_S, 1.75 * HOUSE_S + 0.04, 0, 0.7 * HOUSE_S));
        houseGroup.add(createWindow(0.75 * HOUSE_S, 1.5 * HOUSE_S, 1.75 * HOUSE_S + 0.04, 0, 0.7 * HOUSE_S));

        houseGroup.position.set(-7, 0, -3);
        scene.add(houseGroup);
        buildings.push({
            minX: houseGroup.position.x - 1.25 * HOUSE_S, maxX: houseGroup.position.x + 1.25 * HOUSE_S,
            minZ: houseGroup.position.z - 1.75 * HOUSE_S, maxZ: houseGroup.position.z + 1.75 * HOUSE_S,
            label: 'house'
        });

        // ══════════════════════════════════════════════
        // WELL (near house)
        // ══════════════════════════════════════════════
        const wellGroup = new THREE.Group();
        const wellBase = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.65, 0.8, 16), stoneMat);
        wellBase.position.y = 0.4;
        wellBase.castShadow = true;
        wellBase.receiveShadow = true;
        wellGroup.add(wellBase);

        // Well roof posts
        for (let i = 0; i < 2; i++) {
            const post = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1.4, 8), darkWoodMat);
            post.position.set(i === 0 ? -0.45 : 0.45, 1.1, 0);
            post.castShadow = true;
            wellGroup.add(post);
        }
        // Well roof
        const wellRoof = new THREE.Mesh(new THREE.ConeGeometry(0.7, 0.5, 6), darkWoodMat);
        wellRoof.position.y = 1.8;
        wellRoof.castShadow = true;
        wellGroup.add(wellRoof);

        // Crank
        const crankAxle = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.6, 8), ironMat);
        crankAxle.position.set(0.3, 1.2, 0.3);
        crankAxle.rotation.z = Math.PI / 2;
        crankAxle.castShadow = true;
        wellGroup.add(crankAxle);

        wellGroup.position.set(-5, getGroundHeight(-5, -5) + 0.01, -5);
        scene.add(wellGroup);
        buildings.push({
            minX: wellGroup.position.x - 0.7, maxX: wellGroup.position.x + 0.7,
            minZ: wellGroup.position.z - 0.7, maxZ: wellGroup.position.z + 0.7,
            label: 'well'
        });

        // ══════════════════════════════════════════════
        // HAY BALES (near barn)
        // ══════════════════════════════════════════════
        function createHayBale(x, z, s = 1.0) {
            const group = new THREE.Group();
            const bale = new THREE.Mesh(
                new THREE.CylinderGeometry(0.4 * s, 0.4 * s, 0.7 * s, 16),
                hayMat
            );
            bale.position.y = 0.35 * s;
            bale.castShadow = true;
            bale.receiveShadow = true;
            group.add(bale);
            // Twine lines
            for (let i = 0; i < 2; i++) {
                const twine = new THREE.Mesh(
                    new THREE.TorusGeometry(0.41 * s, 0.02, 8, 16),
                    new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.9 })
                );
                twine.rotation.x = Math.PI / 2;
                twine.position.y = 0.2 + i * 0.3 * s;
                group.add(twine);
            }
            group.position.set(x, getGroundHeight(x, z), z);
            group.rotation.y = Math.random() * Math.PI;
            return group;
        }

        const hayBales = [
            [3.5, -5.2, 1.0], [4.3, -5.5, 0.85], [4.0, -5.0, 0.9],
            [3.5, -4.5, 0.75], [4.5, -4.8, 0.8],
        ];
        hayBales.forEach(([x, z, s]) => scene.add(createHayBale(x, z, s)));

        // ══════════════════════════════════════════════
        // SCARECROW (in crop field)
        // ══════════════════════════════════════════════
        const scarecrowGroup = new THREE.Group();
        const scBody = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 0.15), woodMat);
        scBody.position.y = 0.6;
        scBody.castShadow = true;
        scarecrowGroup.add(scBody);
        // Cross arm
        const scArm = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.08, 0.08), woodMat);
        scArm.position.y = 1.0;
        scArm.castShadow = true;
        scarecrowGroup.add(scArm);
        // Head
        const scHead = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 6), whiteMat);
        scHead.position.y = 1.3;
        scHead.castShadow = true;
        scarecrowGroup.add(scHead);
        // Hat
        const scHatBrim = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 0.04, 12), darkWoodMat);
        scHatBrim.position.y = 1.4;
        scHatBrim.castShadow = true;
        scarecrowGroup.add(scHatBrim);
        const scHatTop = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.14, 0.25, 12), darkWoodMat);
        scHatTop.position.y = 1.52;
        scHatTop.castShadow = true;
        scarecrowGroup.add(scHatTop);
        // Post
        const scPost = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.8, 8), woodMat);
        scPost.position.y = -0.4;
        scPost.castShadow = true;
        scarecrowGroup.add(scPost);

        scarecrowGroup.position.set(4.5, 0.6, 6.5);
        scene.add(scarecrowGroup);
        buildings.push({
            minX: scarecrowGroup.position.x - 0.15, maxX: scarecrowGroup.position.x + 0.15,
            minZ: scarecrowGroup.position.z - 0.15, maxZ: scarecrowGroup.position.z + 0.15,
            label: 'scarecrow'
        });

        // ══════════════════════════════════════════════
        // CART / WAGON (near barn)
        // ══════════════════════════════════════════════
        const cartGroup = new THREE.Group();
        const cartBed = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.2, 1.0), woodMat);
        cartBed.position.y = 0.5;
        cartBed.castShadow = true;
        cartBed.receiveShadow = true;
        cartGroup.add(cartBed);

            fenceGroup.add(rail);

        function buildFenceSide(points) {
            for (let i = 0; i < points.length - 1; i++) {
                const [x1, z1] = points[i];
                const [x2, z2] = points[i + 1];
                addFencePost(x1, z1);
                addFenceRail(x1, z1, x2, z2, 0.55);
                addFenceRail(x1, z1, x2, z2, 1.05);
            }
            const [lx, lz] = points[points.length - 1];
            addFencePost(lx, lz);
            if (points.length >= 2) {
                const [px, pz] = points[points.length - 2];

        // FIRST-PERSON EVENT HANDLERS
        // ══════════════════════════════════════════════
        const FENCE_MARGIN = 0.4;

        function checkCollision(x, z, radius = 0.35) {
            for (const b of buildings) {
                const closestX = Math.max(b.minX, Math.min(x, b.maxX));
                const closestZ = Math.max(b.minZ, Math.min(z, b.maxZ));
                const dx = x - closestX;
                const dz = z - closestZ;
                if (dx * dx + dz * dz < radius * radius) {
                    return { hit: true, pushX: closestX, pushZ: closestZ, radius, label: b.label };
                }
            }
            // Fence boundary
            const outerHalfW = halfW - FENCE_MARGIN;
            const outerHalfD = halfD - FENCE_MARGIN;
            if (z > halfD - 0.3 && (x < -1.8 || x > 1.8)) {
                if (Math.abs(z - (halfD - 0.3)) < radius + 1.0) {
                    return { hit: true, pushX: x, pushZ: halfD - 0.45, radius, label: 'fence' };
                }
            }
            if (z < -outerHalfD) return { hit: true, pushX: x, pushZ: -outerHalfD, radius, label: 'fence' };
            if (x > outerHalfW) return { hit: true, pushX: outerHalfW, pushZ: z, radius, label: 'fence' };
            if (x < -outerHalfW) return { hit: true, pushX: -outerHalfW, pushZ: z, radius, label: 'fence' };
            return { hit: false };
        }

        function enterFirstPerson() {
            isFirstPerson = true;
            captureOrbitOrientation();
            controls.enabled = false;
            renderer.domElement.requestPointerLock();
            fpsState.velocity.set(0, 0, 0);
            updateHUD();
        }

        function exitFirstPerson() {
            isFirstPerson = false;
            controls.enabled = true;
            controls.target.copy(camera.position);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            controls.target.add(dir.multiplyScalar(5));
            controls.target.y = Math.max(controls.target.y, 1);
            controls.update();
            document.exitPointerLock();
            updateHUD();
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyF' && !e.repeat) {
                if (isFirstPerson) { exitFirstPerson(); }
                else { enterFirstPerson(); }
                return;
            }
            const key = e.key.toLowerCase();
            if (key in keys) { keys[key] = true; }
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') { keys.shift = true; }
        });

        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key in keys) { keys[key] = false; }
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') { keys.shift = false; }
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement !== renderer.domElement && isFirstPerson) {
                exitFirstPerson();
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isFirstPerson || document.pointerLockElement !== renderer.domElement) return;
            const sensitivity = 0.002;
            fpsState.yaw -= e.movementX * sensitivity;
            fpsState.pitch -= e.movementY * sensitivity;
            fpsState.pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, fpsState.pitch));
        });

        // ══════════════════════════════════════════════
        // ANIMATION LOOP
        // ══════════════════════════════════════════════
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.elapsedTime;

            if (isFirstPerson) {
                // ── First-person movement ──
                const speed = fpsState.moveSpeed * (keys.shift ? 1.8 : 1.0) * delta;
                const forward = new THREE.Vector3(Math.sin(fpsState.yaw), 0, Math.cos(fpsState.yaw));
                const right = new THREE.Vector3(Math.cos(fpsState.yaw), 0, -Math.sin(fpsState.yaw));

                const moveDir = new THREE.Vector3();
                if (keys.w) moveDir.add(forward);
                if (keys.s) moveDir.sub(forward);
                if (keys.a) moveDir.sub(right);
                if (keys.d) moveDir.add(right);

                if (moveDir.length() > 0) {
                    moveDir.normalize().multiplyScalar(speed);
                }

                const newX = camera.position.x + moveDir.x;
                const newZ = camera.position.z + moveDir.z;
                const col = checkCollision(newX, newZ, 0.4);

                if (col.hit) {
                    const colX = checkCollision(newX, camera.position.z, 0.4);
                    if (!colX.hit) camera.position.x = newX;
                    const colZ = checkCollision(camera.position.x, newZ, 0.4);
                    if (!colZ.hit) camera.position.z = newZ;
                } else {
                    camera.position.x = newX;
                    camera.position.z = newZ;
                }

                camera.position.y = getGroundHeight(camera.position.x, camera.position.z) + fpsState.eyeHeight;

                const lookTarget = new THREE.Vector3(
                    camera.position.x + Math.sin(fpsState.yaw) * Math.cos(fpsState.pitch),
                    camera.position.y + Math.sin(fpsState.pitch),
                    camera.position.z + Math.cos(fpsState.yaw) * Math.cos(fpsState.pitch)
                );
                camera.lookAt(lookTarget);
            } else {
                // ── God mode: WASD pans the camera target ──
                const panSpeed = 6 * delta;
                const forward = new THREE.Vector3();
                camera.getWorldDirection(forward);
                forward.y = 0;
                forward.normalize();
                const right = new THREE.Vector3();
                right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

                if (keys.w) controls.target.add(forward.clone().multiplyScalar(panSpeed));
                if (keys.s) controls.target.add(forward.clone().multiplyScalar(-panSpeed));
                if (keys.a) controls.target.add(right.clone().multiplyScalar(-panSpeed));
                if (keys.d) controls.target.add(right.clone().multiplyScalar(panSpeed));

                controls.update();
            }

            // Wind effect on crops
            cropGroups.forEach((bed, bedIdx) => {
                bed.children.forEach((plant, plantIdx) => {
                    if (plant.isMesh) return;
                    const phase = bedIdx * 0.7 + plantIdx * 0.15;
                    const sway = Math.sin(time * 1.2 + phase) * 0.07;
                    plant.rotation.z += (sway - plant.rotation.z) * 0.08;
                    if (bed.userData.cropType !== 'pumpkin') {
                        plant.rotation.x += (Math.cos(time * 1.2 + phase) * 0.05 - plant.rotation.x) * 0.08;
                    }
                });
            });

            // Cloud drift
            cloudGroups.forEach((cloud, i) => {
                cloud.position.x = cloud.userData.startX + Math.sin(time * 0.08 + i) * 5;
                cloud.position.z = cloud.userData.startZ + Math.cos(time * 0.06 + i) * 3;
            });

            // Bird flight
            birdGroup.children.forEach(bird => {
                const angle = time * bird.userData.speed + bird.userData.phase;
                bird.position.x = bird.userData.baseX + Math.cos(angle) * bird.userData.radius;
                bird.position.z = bird.userData.baseZ + Math.sin(angle * 0.7) * bird.userData.radius * 0.6;
                bird.position.y = bird.userData.baseY + Math.sin(angle * 0.5) * 0.6;
                bird.rotation.y = angle + Math.PI / 2;
            });

            // Dog animation
            if (dogGroup.userData) {
                const dt = time + dogGroup.userData.animTime;
                dogGroup.position.x = dogGroup.userData.baseX + Math.sin(dt * 0.3) * 0.8;
                dogGroup.position.z = dogGroup.userData.baseZ + Math.cos(dt * 0.4) * 0.6;
                dogGroup.rotation.y = Math.sin(dt * 0.3) * 0.5;
            }

            renderer.render(scene, camera);
        }

        // ──────────────────────────────────
        // RESIZE HANDLER
        // ──────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ──────────────────────────────────
        // START
        // ──────────────────────────────────
        animate();
        updateHUD();
        console.log('Farm v2 is ready! F = first person, WASD = move, scroll = zoom.');
    </script>
</body>
</html>
